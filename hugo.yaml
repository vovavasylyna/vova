baseURL: https://vasylyna.net
languageCode: en
title: Volodymyr Vasylyna
defaultContentLanguage: en

params:
  description: "Blog by Volodymyr Vasylyna — on slow productivity, digital minimalism, books, and everything in between."
  author: Volodymyr Vasylyna
  # Used as the default Open Graph / Twitter preview image. Place the file in /static/images/.
  ogImage: /images/og-default.jpg
  # Optional: your handle without the @
  twitter: ""

menus:
  main:
    - name: home
      url: /
      weight: 1
    - name: posts
      url: /posts/
      weight: 2
    - name: read
      url: /books/
      weight: 3
    - name: renovation
      url: /renovation/
      weight: 4
    - name: uses
      url: /uses/
      weight: 5
    - name: travel
      url: /travel/
      weight: 6

markup:
  goldmark:
    renderer:
      unsafe: true

outputs:
  home:
    - HTML
    - RSS

outputFormats:
  RSS:
    mediaType: application/rss+xml
    baseName: index
