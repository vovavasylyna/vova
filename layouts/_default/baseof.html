<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <link rel="icon" href="data:,">
  <title>{{ if not .IsHome }}{{ .Title }} — {{ end }}{{ .Site.Title }}</title>
  {{ with .OutputFormats.Get "RSS" }}
    <link rel="alternate" type="{{ .MediaType }}" title="RSS" href="{{ .Permalink }}">
  {{ end }}
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header>
    <nav>
      {{ range .Site.Menus.main }}
        <a href="{{ .URL }}">{{ .Name }}</a>
      {{ end }}
    </nav>
  </header>
  <main>
    {{ block "main" . }}{{ end }}
  </main>
  <footer>
    <small>
      Subscribe via <a href="/index.xml">RSS</a>,
      <a href="https://t.me/vovavasylynablog">Telegram</a>
      or say hello via <a href="mailto:vasilinavova@gmail.com">email</a>.
    </small>
  </footer>
</body>
</html>
