<section id="newsletter" class="newsletter" aria-labelledby="newsletter-title">
  <h2 id="newsletter-title">Newsletter</h2>
  <p>New posts in your inbox, now and then. No spam — unsubscribe anytime.</p>
  <form id="newsletter-form" method="post" action="/api/subscribe">
    <label class="visually-hidden" for="newsletter-email">Email address</label>
    <input id="newsletter-email" type="email" name="email" placeholder="you@example.com" required autocomplete="email" spellcheck="false">
    {{/* Honeypot: hidden from people, bots tend to fill every field. Server rejects if set. */}}
    <input type="text" name="website" class="hp" tabindex="-1" autocomplete="off" aria-hidden="true">
    <button type="submit">Subscribe</button>
  </form>
  <p class="newsletter-msg" role="status" aria-live="polite"></p>
</section>
<script>
  (function () {
    var form = document.getElementById('newsletter-form');
    if (!form) return;
    var msg = document.querySelector('.newsletter-msg');
    form.addEventListener('submit', function (e) {
      e.preventDefault();
      var button = form.querySelector('button');
      var email = form.querySelector('input[name="email"]').value;
      button.disabled = true;
      msg.textContent = 'Sending…';
      fetch('/api/subscribe', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
        body: JSON.stringify({ email: email })
      })
        .then(function (r) { return r.json().then(function (d) { return { ok: r.ok, data: d }; }); })
        .then(function (res) {
          if (res.ok) {
            form.reset();
            msg.textContent = 'Almost there — check your inbox to confirm.';
          } else {
            msg.textContent = (res.data && res.data.error) || 'Something went wrong. Please try again.';
          }
        })
        .catch(function () { msg.textContent = 'Network error. Please try again.'; })
        .finally(function () { button.disabled = false; });
    });
  })();
</script>
